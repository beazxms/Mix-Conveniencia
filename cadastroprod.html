<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produto</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f4f4;
      background-image: url("images/background-pattern.png");
    }

    .container-box {
      width: 900px;
      margin: 30px auto;
      background: #fff;
      padding: 20px;
      border-radius: 6px;
    }

    .titulo {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #013a8c;
      margin-bottom: 20px;
    }

    .section {
      background: #013a8c;
      color: white;
      padding: 8px;
      border-radius: 4px;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container-box">

    <div class="titulo">Cadastro de Produtos</div>

    <form action="listadeprod.html" method="POST">

      <div class="section">Dados do Produto</div>

      <div class="row mt-2">
        <div class="col-3">
          <label>Código</label>
          <input type="text" class="form-control" name="codigo" required>
        </div>

        <div class="col">
          <label>Nome do Produto</label>
          <input type="text" class="form-control" name="nome" required>
        </div>
      </div>
      <div class="row mt-2">
        <div class="col">
          <label>Marca do Produto</label>
          <input type="text" class="form-control" name="marca">
        </div>
      </div>


      <div class="mt-2">
        <label>Descrição</label>
        <textarea class="form-control" name="descricao" rows="3"></textarea>
      </div>

      <div class="row mt-2">
        <div class="col">
          <label>Categoria</label>
          <select class="form-control" name="categoria">
            <option>Selecione</option>
            <option>Bebidas</option>
            <option>Mercearia</option>
            <option>Doces</option>
            <option>Snacks</option>
          </select>
        </div>

        <div class="col">
          <label>Unidade</label>
          <select class="form-control" name="unidade">
            <option>UN</option>
            <option>KG</option>
            <option>L</option>
            <option>ML</option>
          </select>
        </div>
      </div>

      <div class="row mt-2">
        <div class="col">
          <label>Valor Unitário (R$)</label>
          <input type="number" step="0.01" class="form-control" name="valor">
        </div>

        <div class="col">
          <label>Quantidade</label>
          <input type="number" class="form-control" name="quantidade">
        </div>
      </div>


      <div class="section">Informações Extras</div>

      <div class="row mt-2">
        <div class="col">
          <label>Fornecedor</label>
          <input type="text" class="form-control" name="fornecedor">
        </div>

        <div class="col">
          <label>Data de Cadastro</label>
          <input type="date" class="form-control" name="dataCadastro">
        </div>
      </div>

      <div class="mt-2">
        <label>Observações</label>
        <textarea class="form-control" name="obs" rows="2"></textarea>
      </div>


      <div class="d-flex justify-content-end mt-4 gap-2">
        <button type="reset" class="btn btn-secondary">Cancelar</button>

        <button type="submit" class="btn text-white" style="background:#013a8c;">
          Salvar Produto
        </button>
      </div>

    </form>

  </div>
  <div id="footer-bottom">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-6 copyright">
          <p>© Mix Conveniência. Todos os direitos reservados. </p>
        </div>

</body>

</html>
