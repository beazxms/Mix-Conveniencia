<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos Cadastrados</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f4f4;
    }

    .container-box {
      width: 1000px;
      margin: 30px auto;
      background: #fff;
      padding: 20px;
      border-radius: 6px;
    }

    .titulo {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #013a8c;
      margin-bottom: 20px;
    }

    .section {
      background: #013a8c;
      color: white;
      padding: 10px;
      border-radius: 4px;
      margin-top: 15px;
      font-weight: bold;
    }

    .sucesso {
      background: #d4edda;
      color: #155724;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
      text-align: center;
      font-weight: bold;
    }

    .btn-custom {
      background: #013a8c;
      color: white;
    }

    .btn-custom:hover {
      background: #012f6b;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container-box">

    <div class="titulo">Controle de Produtos</div>

    <div class="sucesso">
      ✅ Produto cadastrado com sucesso!
    </div>

    <div class="d-flex justify-content-end mb-3">
      <a href="cadastroprod.html" class="btn btn-custom">
        + Novo Produto
      </a>
    </div>


    <div class="section">Lista de Produtos</div>

    <table class="table table-bordered table-hover mt-2" id="tabela">
      <thead class="table-light">
        <tr>
          <th>Código</th>
          <th>Produto</th>
          <th>Categoria</th>
          <th>Valor</th>
          <th>Quantidade</th>
          <th>Unidade</th>
        </tr>
      </thead>
      <tbody id="tabelaProdutos">

      </tbody>
    </table>

  </div>
  <div id="footer-bottom">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-6 copyright">
          <p>© Mix Conveniência. Todos os direitos reservados. </p>
        </div>
        <script src="js/tabela-produtos.js"></script>
</body>

</html>
